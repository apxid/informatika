<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Siswa</title>

<style>
body{
  font-family: system-ui;
  background:#eaf2ff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  background:#fff;
  padding:30px;
  border-radius:16px;
  width:420px;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
}
label{font-size:13px;margin-top:12px;display:block}
select,input,button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #cbd5e1;
}
button{
  margin-top:20px;
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
}
#msg{text-align:center;margin-top:12px}

.logo {
  display: block;
  margin: 0 auto 12px auto;
  max-width: 90px;
}

/* TABEL STATUS SISWA */
.table-box{
  margin-top:20px;
  border-top:1px solid #e5e7eb;
  padding-top:15px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
th,td{
  border:1px solid #e5e7eb;
  padding:6px;
  text-align:left;
}
th{
  background:#f1f5f9;
}
.status-ok{color:green;font-weight:bold}
.status-no{color:red;font-weight:bold}

/* ===== POPUP MODAL DI TENGAH ===== */
.modal-bg{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:25px 30px;
  border-radius:16px;
  text-align:center;
  width:260px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.modal-box h3{
  margin:0;
  color:#16a34a;
}

.modal-box p{
  margin:10px 0 15px 0;
}

.modal-box button{
  background:#16a34a;
}
</style>
</head>

<body>

<div class="modal-bg" id="modal">
  <div class="modal-box">
    <h3>BERHASIL</h3>
    <p>Absen tersimpan</p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<div class="card">

  <img src="assets/logo.png" alt="Logo Sekolah" class="logo">

  <h3 style="text-align:center">Absensi Siswa</h3>

<label>Kelas</label>
<select id="kelas"><option value="">-- Pilih Kelas --</option></select>

<label>Nama</label>
<select id="nama" disabled><option value="">-- Pilih Nama --</option></select>

<label>Jenis Kelamin</label>
<input id="jk" readonly>

<label>No Meja</label>
<select id="noMeja"><option value="">-- Pilih --</option></select>

<label>Tanggal</label>
<input id="tanggal" readonly>

<label>Status</label>
<select id="status">
<option value="">-- Pilih --</option>
<option>Hadir</option>
<option>Izin</option>
<option>Sakit</option>
<option>Alpa</option>
</select>

<button onclick="submitAbsensi()" id="btn">Simpan Presensi</button>
<div id="msg"></div>

<div class="table-box">
  <h4 style="margin:10px 0 5px 0;font-size:14px">
  📋 Status Absensi Kelas
  </h4>

  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="statusTable"></tbody>
  </table>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby1fLFrDV5383WWQt3rKJ81qwHctauYW6ACO2U3PZRCb1Sb1-RgYsFcCy_onEPMinpcnA/exec";

const kelas = document.getElementById("kelas");
const nama = document.getElementById("nama");
const jk = document.getElementById("jk");
const status = document.getElementById("status");
const noMeja = document.getElementById("noMeja");
const tanggal = document.getElementById("tanggal");
const btn = document.getElementById("btn");
const statusTable = document.getElementById("statusTable");
const modal = document.getElementById("modal");

let dataSiswa = [];

tanggal.value = new Date().toLocaleString("id-ID");

// isi pilihan meja
for(let i=1;i<=40;i++){
  noMeja.innerHTML += `<option>Meja ${i}</option>`;
}

// LOAD DATA SISWA
fetch(API_URL + "?action=getDataSiswa")
.then(r=>r.json())
.then(d=>{
  dataSiswa=d;
  [...new Set(d.map(s=>s.rombel))].forEach(k=>{
    kelas.innerHTML += `<option>${k}</option>`;
  });
});

// PILIH KELAS
kelas.onchange = ()=>{
  nama.innerHTML='<option value="">-- Pilih Nama --</option>';
  nama.disabled=true;
  jk.value="";

  dataSiswa
   .filter(s=>s.rombel===kelas.value)
   .forEach(s=>{
     nama.innerHTML+=`<option data-jk="${s.jk}">${s.nama}</option>`;
   });

  nama.disabled=false;
  renderStatusTable();
};

// PILIH NAMA
nama.onchange = ()=>{
  jk.value = nama.selectedOptions[0]?.dataset.jk || "";
};

// TAMPILKAN POPUP TENGAH
function showModal(){
  modal.style.display="flex";
}
function closeModal(){
  modal.style.display="none";
}

// SUBMIT ABSENSI (PAKAI POPUP TENGAH)
function submitAbsensi(){
  if(!nama.value || !kelas.value || !status.value){
    alert("Isi semua data dulu");
    return;
  }

  btn.disabled=true;
  btn.innerText="Menyimpan...";

  const fd=new URLSearchParams();
  fd.append("action","submitAbsensi");
  fd.append("nama",nama.value);
  fd.append("jk",jk.value);
  fd.append("rombel",kelas.value);
  fd.append("status",status.value);
  fd.append("noMeja",noMeja.value);

  fetch(API_URL,{method:"POST",body:fd})
  .then(r=>r.json())
  .then(res=>{

    if(res.status==="success"){
      showModal();   // 👉 POPUP TENGAH
    }else if(res.status==="duplicate"){
      alert("⚠️ SUDAH ABSEN\nAnda sudah melakukan presensi hari ini.");
    }else{
      alert("❌ ERROR: " + res.message);
    }

    btn.disabled=false;
    btn.innerText="Simpan Presensi";
    renderStatusTable();
  })
  .catch(()=>{
    alert("❌ Gagal menyimpan");
    btn.disabled=false;
    btn.innerText="Simpan Presensi";
  });
}

// TABEL STATUS
function renderStatusTable(){
  if(!kelas.value){
    statusTable.innerHTML = "";
    return;
  }

  fetch(API_URL + `?action=getBelumAbsen&rombel=${encodeURIComponent(kelas.value)}`)
  .then(r=>r.json())
  .then(res=>{

    const belum = res.daftarBelum || [];

    const siswaKelas = dataSiswa
      .filter(s=>s.rombel===kelas.value)
      .map(s=>s.nama);

    let html="";

    siswaKelas.forEach(nama=>{
      const sudah = !belum.includes(nama);

      html += `
      <tr>
        <td>${nama}</td>
        <td>
          ${sudah 
            ? '<span class="status-ok">✔️ Sudah Absen</span>'
            : '<span class="status-no">❌ Belum Absen</span>'}
        </td>
      </tr>
      `;
    });

    statusTable.innerHTML = html;
  });
}
</script>

</body>
</html>
