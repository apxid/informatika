<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Robot Challenge Level 3</title>

<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    background:#eef5ff;
    margin:20px;
}

h1{
    color:#1565c0;
}

#arena{
    display:grid;
    grid-template-columns:repeat(5,70px);
    gap:5px;
    justify-content:center;
    margin:20px auto;
}

.cell{
    width:70px;
    height:70px;
    border:2px solid #999;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    border-radius:10px;
}

button{
    padding:10px 15px;
    margin:4px;
    font-size:15px;
    cursor:pointer;
}

#program{
    width:320px;
    min-height:120px;
    margin:auto;
    background:white;
    border:1px solid #ccc;
    padding:10px;
    text-align:left;
    border-radius:10px;
}

#status{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🤖 Robot Challenge - Level 3</h1>

<h3>Misi : Ambil 📦 tanpa menabrak 🚧</h3>

<div id="arena"></div>

<h3>Program Robot</h3>

<div id="program"></div>

<br>

<button onclick="add('MAJU')">⬆ MAJU</button>
<button onclick="add('KANAN')">↪ KANAN</button>
<button onclick="add('KIRI')">↩ KIRI</button>
<button onclick="add('AMBIL')">📦 AMBIL</button>

<br><br>

<button onclick="jalan()">▶ JALANKAN</button>
<button onclick="resetGame()">🔄 RESET</button>

<div id="status"></div>

<script>

//==============================
// MAP
//
// 🤖 . . 🚧 .
// 🚧 🚧 . 🚧 .
// . . . . 📦
//
//==============================

let map=[
"R",".",".","#",".",
"#","#",".","#",".",
".",".",".",".","T"
];

const startRobot=0;

let robot=startRobot;
let arah=1; //0 atas 1 kanan 2 bawah 3 kiri

let program=[];
let ambil=false;

function gambar(){

    let arena=document.getElementById("arena");

    arena.innerHTML="";

    map.forEach((isi,index)=>{

        let cell=document.createElement("div");
        cell.className="cell";

        if(isi=="#") cell.innerHTML="🚧";

        if(isi=="T") cell.innerHTML="📦";

        if(index==robot){

            let robotIcon=[
            "🤖⬆",
            "🤖➡",
            "🤖⬇",
            "🤖⬅"
            ];

            cell.innerHTML=robotIcon[arah];

        }

        arena.appendChild(cell);

    });

}

gambar();

function add(cmd){

    program.push(cmd);

    document.getElementById("program").innerHTML=
    program.map((x,i)=>`${i+1}. ${x}`).join("<br>");

}

function resetGame(){

    robot=startRobot;
    arah=1;
    ambil=false;
    program=[];

    document.getElementById("program").innerHTML="";
    document.getElementById("status").innerHTML="";

    gambar();

}

function delay(ms){
    return new Promise(r=>setTimeout(r,ms));
}

async function jalan(){

    robot=startRobot;
    arah=1;
    ambil=false;

    document.getElementById("status").innerHTML="";

    gambar();

    for(let cmd of program){

        await delay(600);

        if(cmd=="KANAN"){

            arah=(arah+1)%4;
            gambar();
            continue;

        }

        if(cmd=="KIRI"){

            arah=(arah+3)%4;
            gambar();
            continue;

        }

        if(cmd=="MAJU"){

            let tujuan=robot;

            // CEK BATAS

            if(arah==0){

                if(robot<5) continue;

                tujuan-=5;

            }

            if(arah==1){

                if(robot%5==4) continue;

                tujuan+=1;

            }

            if(arah==2){

                if(robot>=10) continue;

                tujuan+=5;

            }

            if(arah==3){

                if(robot%5==0) continue;

                tujuan-=1;

            }

            if(map[tujuan]=="#"){

                document.getElementById("status").innerHTML=
                "💥 ROBOT MENABRAK RINTANGAN";

                return;

            }

            robot=tujuan;

            gambar();

            continue;

        }

        if(cmd=="AMBIL"){

            if(map[robot]=="T"){

                ambil=true;

            }

            gambar();

        }

    }

    if(ambil){

        document.getElementById("status").innerHTML=
        "🎉 MISI BERHASIL";

    }else{

        document.getElementById("status").innerHTML=
        "❌ Robot belum mengambil 📦";

    }

}
</script>

</body>
</html>
